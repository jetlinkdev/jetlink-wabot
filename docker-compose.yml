version: '3.8'

services:
  bot-wa:
    build: .
    container_name: whatsapp-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - bot-data:/root/
    environment:
      - FOONTE_TOKEN=${FOONTE_TOKEN}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8080}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-qwen/qwen3-32b}
      - DATABASE_PATH=/root/bot.db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - bot-network

volumes:
  bot-data:
    driver: local

networks:
  bot-network:
    driver: bridge
